<!DOCTYPE html>
<html>
<head>
    <title>Half-Clutch Jenkins Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        .board { display: flex; gap: 20px; margin-bottom: 40px; }
        .column { flex: 1; background: #1a1a1a; border-radius: 8px; padding: 15px; min-height: 400px; }
        .column-header { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 5px; }

        /* Job Cards */
        .job-card { background: #262626; border-radius: 6px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .repo-name { color: #aaa; font-size: 0.85em; }
        .priority-tag { float: right; font-size: 0.7em; padding: 2px 6px; border-radius: 3px; background: #444; }

        /* Pipeline Stages */
        .stages { margin-top: 10px; }
        .stage { font-size: 0.7em; padding: 3px; margin-bottom: 3px; border-radius: 2px; display: block; text-align: center; }
        .stage-done { background: #2e7d32; color: #a5d6a7; }
        .stage-wait { background: #333; color: #666; }

        /* Database Table */
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; font-size: 0.85em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; background: #222; }
        code { color: #ff9800; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Half-Clutch Jenkins Dashboard</h2>
    </div>

    <div class="board">
        <div class="column">
            <div class="column-header" style="color:#2196f3">Queued</div>
            <div id="q-list"></div>
        </div>
        <div class="column">
            <div class="column-header" style="color:#ff9800">In Progress</div>
            <div id="p-list"></div>
        </div>
        <div class="column">
            <div class="column-header" style="color:#4caf50">Completed</div>
            <div id="c-list"></div>
        </div>
    </div>

    <h3>📜 Postgres Database History</h3>
    <table>
        <thead>
            <tr>
                <th>Job ID</th>
                <th>Repository</th>
                <th>Importance</th>
                <th>File Size</th>
                <th>Code Hash (MD5)</th>
                <th>Final Status</th>
            </tr>
        </thead>
        <tbody id="db-table"></tbody>
    </table>

    <script>
        async function refresh() {
            const res = await fetch('http://localhost:8000/jobs');
            const jobs = await res.json();

            const containers = { 'QUEUED': 'q-list', 'RUNNING': 'p-list', 'COMPLETED': 'c-list' };
            Object.values(containers).forEach(id => document.getElementById(id).innerHTML = "");
            document.getElementById('db-table').innerHTML = "";

            jobs.forEach(job => {
                // 1. Add to Kanban Columns
                const card = `
                    <div class="job-card">
                        <span class="priority-tag">P${job.priority}</span>
                        <div class="repo-name">${job.repo}</div>
                        <div class="stages">
                            <div class="stage ${job.status!=='QUEUED'?'stage-done':'stage-wait'}">Fetch Code</div>
                            <div class="stage ${job.status==='COMPLETED'?'stage-done':'stage-wait'}">Docker Build</div>
                        </div>
                    </div>
                `;
                document.getElementById(containers[job.status]).insertAdjacentHTML('beforeend', card);

                // 2. Add to Database History Table
                document.getElementById('db-table').insertAdjacentHTML('beforeend', `
                    <tr>
                        <td>${job.id.substring(0,8)}</td>
                        <td>${job.repo}</td>
                        <td><strong>Priority ${job.priority}</strong></td>
                        <td>${job.file_size} KB</td>
                        <td><code>${job.code_hash.substring(0,10)}...</code></td>
                        <td>${job.status}</td>
                    </tr>
                `);
            });
        }
        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>

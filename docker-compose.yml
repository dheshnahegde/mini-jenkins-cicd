services:
  redis:
    image: redis:alpine
    ports: ["6379:6379"]
  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jenkins_db
    ports: ["5432:5432"]
  master:
    build: .
    command: python master.py
    ports:
      ["8000:8000"]
    depends_on:
      - redis
      - db
  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
      - db